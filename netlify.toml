# Netlify deploy config for theoracles.studio
# Committed so the build is reproducible across Netlify + local + CI.

[build]
  # Astro's build outputs static files to ./dist by default.
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro + Tailwind v4 need Node 20+.
  NODE_VERSION = "20"

# Long-cache for fingerprinted Astro assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "interest-cohort=()"
