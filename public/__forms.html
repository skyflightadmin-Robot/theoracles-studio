<!doctype html>
<!--
  Netlify Forms detection file.

  Netlify scans the deployed static HTML at build time to register forms.
  The Astro-rendered forms sometimes get missed (component-level scripts,
  build ordering, etc.), so this plain HTML page declares every form
  schema explicitly. The file is served by Netlify but never linked from
  the site — it exists only so the form processor knows what to accept.

  Any time a new form is added to the site, mirror its `name` and all
  input `name` attributes here, or POSTs to that form will 404.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form schemas</title>
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>
  </body>
</html>
